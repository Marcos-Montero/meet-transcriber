version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: meet-transcriber-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: meet_transcriber
      POSTGRES_USER: meet
      POSTGRES_PASSWORD: meet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
